<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva de Objetivos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="objetivos-container">
        <!-- Objetivo 0 -->
        <div class="aba-conteudo">
            <h3 class="titulo-principal">Terminar o colégio</h3>
            <div class="contador">
                <div class="contador-digito"><p class="numero" id="dias0">0</p><p class="legenda">dias</p></div>
                <div class="contador-digito"><p class="numero" id="horas0">0</p><p class="legenda">horas</p></div>
                <div class="contador-digito"><p class="numero" id="min0">0</p><p class="legenda">min</p></div>
                <div class="contador-digito"><p class="numero" id="seg0">0</p><p class="legenda">seg</p></div>
            </div>
        </div>

        <!-- Objetivo 1 -->
        <div class="aba-conteudo">
            <h3 class="titulo-principal">Fazer o ENEM</h3>
            <div class="contador">
                <div class="contador-digito"><p class="numero" id="dias1">3</p><p class="legenda">dias</p></div>
                <div class="contador-digito"><p class="numero" id="horas1">0</p><p class="legenda">horas</p></div>
                <div class="contador-digito"><p class="numero" id="min1">0</p><p class="legenda">min</p></div>
                <div class="contador-digito"><p class="numero" id="seg1">0</p><p class="legenda">seg</p></div>
            </div>
        </div>

        <!-- Objetivo 2 -->
        <div class="aba-conteudo">
            <h3 class="titulo-principal">Inscrições Vestibulares</h3>
            <div class="contador">
                <div class="contador-digito"><p class="numero" id="dias2">0</p><p class="legenda">dias</p></div>
                <div class="contador-digito"><p class="numero" id="horas2">0</p><p class="legenda">horas</p></div>
                <div class="contador-digito"><p class="numero" id="min2">0</p><p class="legenda">min</p></div>
                <div class="contador-digito"><p class="numero" id="seg2">0</p><p class="legenda">seg</p></div>
            </div>
        </div>

        <!-- Objetivo 3 -->
        <div class="aba-conteudo">
            <h3 class="titulo-principal">Atualizar currículo</h3>
            <div class="contador">
                <div class="contador-digito"><p class="numero" id="dias3">0</p><p class="legenda">dias</p></div>
                <div class="contador-digito"><p class="numero" id="horas3">0</p><p class="legenda">horas</p></div>
                <div class="contador-digito"><p class="numero" id="min3">0</p><p class="legenda">min</p></div>
                <div class="contador-digito"><p class="numero" id="seg3">0</p><p class="legenda">seg</p></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
