<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Objetivos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <header class="header">
      <h1>Meus Objetivos <span>.</span></h1>
    </header>

    <section class="tabs">

      <div class="tab-buttons">
        <button class="tab active">Cursos</button>
        <button class="tab">Projetos</button>
        <button class="tab">Portfólio</button>
        <button class="tab">Carreira</button>
      </div>

      <div class="tab-content active">
        <h2>Estudar 4 cursos</h2>
        <p>Tempo restante</p>
        <div class="timer" data-index="0"></div>
      </div>

      <div class="tab-content">
        <h2>5 projetos JS</h2>
        <p>Tempo restante</p>
        <div class="timer" data-index="1"></div>
      </div>

      <div class="tab-content">
        <h2>Criar portfólio</h2>
        <p>Tempo restante</p>
        <div class="timer" data-index="2"></div>
      </div>

      <div class="tab-content">
        <h2>Atualizar currículo</h2>
        <p>Tempo restante</p>
        <div class="timer" data-index="3"></div>
      </div>

    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
