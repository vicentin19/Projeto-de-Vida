<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals Experience</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="layout">

    <!-- LADO ESQUERDO -->
    <aside class="sidebar">
      <h1>Goals</h1>

      <nav>
        <button class="nav-item active">Cursos</button>
        <button class="nav-item">Projetos</button>
        <button class="nav-item">Portfólio</button>
        <button class="nav-item">Carreira</button>
      </nav>

      <footer>
        <p>2026 Vision</p>
      </footer>
    </aside>

    <!-- LADO DIREITO -->
    <section class="content">

      <div class="card active">
        <h2>Estudar 4 cursos</h2>
        <p>tempo restante</p>
        <div class="timer" data-i="0"></div>
      </div>

      <div class="card">
        <h2>5 projetos JavaScript</h2>
        <p>tempo restante</p>
        <div class="timer" data-i="1"></div>
      </div>

      <div class="card">
        <h2>Criar portfólio</h2>
        <p>tempo restante</p>
        <div class="timer" data-i="2"></div>
      </div>

      <div class="card">
        <h2>Atualizar currículo</h2>
        <p>tempo restante</p>
        <div class="timer" data-i="3"></div>
      </div>

    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
